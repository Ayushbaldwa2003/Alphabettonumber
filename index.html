<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title to Number Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      text-transform: uppercase;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00c6ff;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      color: #222;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      h2 {
        font-size: 18px;
      }
      input, button {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Excel Column → Number</h2>

    <input type="text" id="inputString" placeholder="Enter column (e.g. AB)">
    
    <button onclick="convert()">Convert</button>

    <div class="result" id="output"></div>
  </div>

  <script>
    function titleToNumber(s) {
      let ans = 0;
      let pos = 1;

      for (let i = s.length - 1; i >= 0; i--) {
        let ch = s.charCodeAt(i) - 65 + 1;
        ans += pos * ch;
        pos *= 26;
      }

      return ans;
    }

    function convert() {
      let input = document.getElementById("inputString").value.trim().toUpperCase();

      if (input === "") {
        document.getElementById("output").innerText = "Please enter a value!";
        return;
      }

      if (!/^[A-Z]+$/.test(input)) {
        document.getElementById("output").innerText = "Only letters A-Z allowed!";
        return;
      }

      let result = titleToNumber(input);
      document.getElementById("output").innerText = "Result: " + result;
    }
  </script>

</body>
</html>
